<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Bakgrunn -->
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>

  <!-- Sirkel ring -->
  <circle cx="256" cy="220" r="155" fill="none" stroke="#e63946" stroke-width="28"/>

  <!-- $ og € inni ringen -->
  <text x="200" y="275"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="120"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle">$</text>

  <text x="315" y="275"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="120"
    font-weight="900"
    fill="#e63946"
    text-anchor="middle">€</text>

  <!-- Rød strek -->
  <rect x="178" y="408" width="156" height="5" rx="2" fill="#e63946"/>

  <!-- VALUTA tekst -->
  <text x="256" y="460"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="34"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="8">
    <tspan fill="#ffffff">VAL</tspan><tspan fill="#e63946">U</tspan><tspan fill="#ffffff">TA</tspan>
  </text>
</svg>
