<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kjederittet — Nakatomi</title>
  <link rel="icon" type="image/svg+xml" href="/nakatomi-icon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .back { color: #555; text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
    .back:hover { color: #e63946; }
    h1 { font-size: 1.6rem; font-weight: 800; }
    h1 span { color: #e63946; }

    .content {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* Period badge */
    .period {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    /* Big km counter */
    .total-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 3rem 4rem;
      text-align: center;
      width: 100%;
    }
    .total-label {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1rem;
    }
    .total-km {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .total-km span { color: #e63946; }
    .total-unit {
      font-size: 1rem;
      font-weight: 400;
      color: #555;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }
    .total-sub {
      font-size: 0.75rem;
      color: #444;
      margin-top: 1rem;
      letter-spacing: 0.08em;
    }

    /* Podium */
    .podium-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #e63946;
      align-self: flex-start;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .podium-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1a1a1a;
    }

    .podium {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
    }

    .podium-item {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .podium-item:first-child { border-color: #3a3010; }
    .podium-item:nth-child(2) { border-color: #2a2a2a; }

    .place {
      font-size: 1.2rem;
      font-weight: 800;
      width: 2rem;
      text-align: center;
      flex-shrink: 0;
    }
    .place-1 { color: #f5c518; }
    .place-2 { color: #aaa; }
    .place-3 { color: #cd7f32; }

    .podium-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
    }
    .podium-km {
      font-size: 1rem;
      font-weight: 800;
      color: #e63946;
    }
    .podium-km-unit {
      font-size: 0.75rem;
      color: #555;
      margin-left: 0.2rem;
    }

    /* Loader */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 4rem 0;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #222;
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 0.78rem; color: #555; letter-spacing: 0.1em; }

    #error-msg { color: #e63946; font-size: 0.88rem; text-align: center; }
    #main { display: none; }

    @media (max-width: 480px) {
      .total-km { font-size: 3.5rem; }
      .total-card { padding: 2rem 2rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="back" href="/">← Nakatomi</a>
  <h1>Kjede<span>rittet</span></h1>
</header>

<div class="content">
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Henter klubbdata fra Strava…</div>
  </div>

  <div id="error-msg"></div>

  <div id="main">
    <div class="period">Januar – 21. juni 2026</div>

    <div class="total-card">
      <div class="total-label">Totalt syklet</div>
      <div class="total-km" id="total-km">—<span>.</span>—</div>
      <div class="total-unit">kilometer</div>
      <div class="total-sub" id="total-sub"></div>
    </div>

    <div class="podium-label">Topp 3</div>
    <div class="podium" id="podium"></div>
  </div>
</div>

<script>
fetch('/api/klubb')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.getElementById('loader').style.display = 'none';

    if (data.error) {
      document.getElementById('error-msg').textContent = 'Feil: ' + data.error;
      return;
    }

    var km = data.totalKm.toLocaleString('nb-NO');
    document.getElementById('total-km').textContent = km;
    document.getElementById('total-sub').textContent = data.count + ' aktiviteter registrert';
    document.getElementById('main').style.display = 'contents';

    var medals = ['place-1', 'place-2', 'place-3'];
    var icons  = ['🥇', '🥈', '🥉'];
    var html = data.leaderboard.map(function(entry, i) {
      return '<div class="podium-item">' +
        '<div class="place ' + medals[i] + '">' + icons[i] + '</div>' +
        '<div class="podium-name">' + entry.name + '</div>' +
        '<div class="podium-km">' + entry.km.toLocaleString('nb-NO') + '<span class="podium-km-unit">km</span></div>' +
        '</div>';
    }).join('');

    document.getElementById('podium').innerHTML = html;
  })
  .catch(function(err) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error-msg').textContent = 'Kunne ikke hente data: ' + err.message;
  });
</script>
</body>
</html>
